<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outfit Gallery</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',-apple-system,sans-serif; background:#faf8f5; color:#3d3529; }

    .banner { height:80px; background:linear-gradient(135deg,#e8ddd3,#d4c5b5 30%,#c9b99a 60%,#bfae8e); position:relative; }
    .banner::after { content:''; position:absolute; bottom:0; left:0; right:0; height:30px; background:linear-gradient(to top,#faf8f5,transparent); }

    .container { max-width:1200px; margin:-10px auto 0; padding:0 2rem 3rem; position:relative; }
    .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
    .page-header h1 { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:600; color:#2c2418; }
    .page-header .subtitle { font-size:0.85rem; color:#9c8b76; }
    .page-header a { font-size:0.8rem; color:#9c8b76; text-decoration:none; }
    .page-header a:hover { color:#3d3529; text-decoration:underline; }

    .toolbar { display:flex; gap:0.6rem; margin-bottom:1.25rem; flex-wrap:wrap; align-items:center; }
    .filter-btn {
      font-size:0.72rem; padding:0.4rem 0.75rem; border-radius:20px;
      border:1px solid #ebe5dc; background:#fff; color:#6b5d4d; cursor:pointer; font-family:inherit;
    }
    .filter-btn:hover { border-color:#c9b99a; }
    .filter-btn.active { background:#3d3529; color:#fff; border-color:#3d3529; }
    .count { font-size:0.72rem; color:#b8a48e; margin-left:auto; }

    /* Outfit cards */
    .outfit-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.25rem;
    }
    .outfit-card {
      background:#fff; border:1px solid #ebe5dc; border-radius:10px;
      overflow:hidden; cursor:pointer; transition:border-color 0.2s,box-shadow 0.2s;
    }
    .outfit-card:hover { border-color:#c9b99a; box-shadow:0 2px 12px rgba(0,0,0,0.05); }

    .outfit-card-info { padding:0.6rem 0.8rem; }
    .outfit-card-title {
      font-family:'Playfair Display',serif; font-size:0.92rem; font-weight:600; color:#2c2418;
      cursor:text; padding:0.1rem 0.2rem; border-radius:3px; margin:-0.1rem -0.2rem;
      transition:background 0.15s;
    }
    .outfit-card-title:hover { background:#f0ebe4; }
    .outfit-card-meta { font-size:0.68rem; color:#9c8b76; margin-top:0.2rem; }
    .outfit-card-season {
      font-size:0.68rem; color:#9c8b76; cursor:pointer; padding:0.1rem 0.2rem;
      border-radius:3px; margin:-0.1rem -0.2rem; transition:background 0.15s;
    }
    .outfit-card-season:hover { background:#f0ebe4; }
    .season-select {
      border:1px solid #c9b99a; border-radius:3px; padding:0.15rem 0.3rem;
      font-size:0.68rem; font-family:inherit; color:#3d3529;
      background:#fff; outline:none; cursor:pointer;
    }
    .outfit-card-tag {
      display:inline-block; font-size:0.58rem; color:#9c8b76; background:#f5f0e8;
      padding:0.12rem 0.4rem; border-radius:10px; margin-top:0.3rem; margin-right:0.2rem;
    }
    .edit-input {
      border:1px solid #c9b99a; border-radius:3px; padding:0.15rem 0.3rem;
      font-size:inherit; font-family:inherit; color:#3d3529;
      background:#fff; outline:none; width:100%;
    }
    /* Drag reorder */
    .outfit-card.dragging { opacity:0.4; }
    .outfit-card.drag-over { border-color:#c9b99a; box-shadow:0 0 0 2px #c9b99a; }
    .outfit-card .drag-handle {
      position:absolute; top:6px; left:6px; background:rgba(255,255,255,0.85);
      border-radius:4px; padding:2px 5px; font-size:0.7rem; color:#b8a48e;
      cursor:grab; z-index:5; opacity:0; transition:opacity 0.15s;
    }
    .outfit-card:hover .drag-handle { opacity:1; }
    .outfit-card .drag-handle:active { cursor:grabbing; }
    .outfit-card .delete-card-btn {
      position:absolute; top:6px; right:6px; background:rgba(255,255,255,0.9);
      border:none; border-radius:4px; padding:2px 6px; font-size:0.7rem;
      color:#c2553a; cursor:pointer; z-index:5; opacity:0; transition:opacity 0.15s;
    }
    .outfit-card:hover .delete-card-btn { opacity:1; }
    .outfit-card .delete-card-btn:hover { background:#fde8e8; }

    /* Detail modal */
    .modal-overlay {
      display:none; position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(44,36,24,0.5); z-index:1000;
      justify-content:center; align-items:flex-start; padding:2rem 1rem;
      overflow-y:auto;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:#fff; border-radius:12px; width:100%; max-width:1100px;
      padding:2rem; position:relative; box-shadow:0 8px 40px rgba(0,0,0,0.15);
    }
    .modal-close {
      position:absolute; top:1rem; right:1.25rem; font-size:1.3rem;
      color:#b8a48e; cursor:pointer; background:none; border:none;
    }
    .modal-close:hover { color:#3d3529; }
    .modal-title {
      font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:600; color:#2c2418;
      margin-bottom:0.3rem;
    }
    .modal-meta { font-size:0.8rem; color:#9c8b76; margin-bottom:1rem; }

    .modal-pieces {
      position:relative; background:#f9f7f4; border-radius:8px;
      width:100%; padding-bottom:65%;
      overflow:hidden;
    }
    .modal-pieces img {
      position:absolute; object-fit:contain;
      cursor:pointer; background:#f9f7f4;
    }
    .modal-pieces:not(.editing) img:hover { transform:scale(1.15); z-index:10; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.15)); }

    /* Edit mode */
    .modal-pieces.editing img {
      cursor:move; border:2px solid transparent; border-radius:4px;
    }
    .modal-pieces.editing img:hover { border-color:#006FED; }
    .modal-pieces.editing img.selected { border-color:#C23B22; }
    .edit-delete-btn {
      position:absolute; top:-8px; right:-8px; width:20px; height:20px;
      background:#C23B22; color:#fff; border-radius:50%; font-size:0.6rem;
      display:none; align-items:center; justify-content:center;
      cursor:pointer; border:none; z-index:20;
    }
    .edit-crop-btn {
      position:absolute; top:-8px; left:-8px; width:20px; height:20px;
      background:#006FED; color:#fff; border-radius:50%; font-size:0.55rem;
      display:none; align-items:center; justify-content:center;
      cursor:pointer; border:none; z-index:20;
    }
    .modal-pieces.editing .piece-wrap:hover .edit-delete-btn { display:flex; }
    .modal-pieces.editing .piece-wrap:hover .edit-crop-btn { display:flex; }
    .piece-wrap { position:absolute; }
    .edit-resize {
      position:absolute; bottom:-4px; right:-4px; width:12px; height:12px;
      background:#013E7D; border-radius:2px; cursor:se-resize;
      display:none; z-index:20;
    }
    .modal-pieces.editing .piece-wrap:hover .edit-resize { display:block; }

    .edit-toolbar {
      display:flex; gap:0.5rem; margin-bottom:0.75rem; align-items:center;
    }
    .edit-btn {
      padding:0.4rem 0.8rem; border-radius:6px; font-size:0.75rem;
      font-family:inherit; cursor:pointer;
      border:1px solid #ebe5dc; background:#fff; color:#6b5d4d;
    }
    .edit-btn:hover { background:#f5f0e8; }
    .edit-btn.primary { background:#013E7D; color:#fff; border-color:#013E7D; }
    .edit-btn.primary:hover { background:#006FED; }
    .edit-btn.danger { color:#C23B22; border-color:#fde8e8; }
    .edit-btn.danger:hover { background:#fde8e8; }
    .edit-btn.active { background:#006FED; color:#fff; border-color:#006FED; }

    .add-piece-panel {
      display:none; position:absolute; top:0; right:-240px; width:220px;
      background:#fff; border:1px solid #ebe5dc; border-radius:8px;
      padding:0.5rem; max-height:500px; overflow-y:auto; z-index:30;
    }
    .add-piece-panel.open { display:block; }
    .add-piece-panel input {
      width:100%; border:1px solid #ebe5dc; border-radius:4px;
      padding:0.3rem 0.5rem; font-size:0.72rem; font-family:inherit;
      margin-bottom:0.5rem; outline:none;
    }
    .add-piece-panel input:focus { border-color:#006FED; }
    .add-piece-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:0.3rem;
    }
    .add-piece-grid img {
      width:100%; aspect-ratio:3/4; object-fit:contain;
      background:#f9f7f4; border:1px solid #ebe5dc; border-radius:3px;
      cursor:pointer;
    }
    .add-piece-grid img:hover { border-color:#006FED; }

    .outfit-preview {
      position:relative; background:#f9f7f4;
      width:100%; padding-bottom:56.25%;
      overflow:hidden;
    }
    .outfit-preview img {
      position:absolute; object-fit:contain;
      background:#f9f7f4;
    }
    .modal-pieces img:hover { transform:scale(1.05); }

    .modal-brands { margin-top:1rem; }
    .modal-brand-tag {
      display:inline-block; font-size:0.7rem; color:#6b5d4d; background:#f5f0e8;
      padding:0.2rem 0.5rem; border-radius:10px; margin:0.15rem;
    }

    /* Zoom */
    .zoom-overlay {
      display:none; position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center;
    }
    .zoom-overlay.open { display:flex; }
    .zoom-overlay img { max-width:90vw; max-height:90vh; border-radius:8px; }
  </style>
</head>
<body>
  <div class="banner"></div>
  <div class="container">
    <div class="page-header">
      <div>
        <h1>Outfit Gallery</h1>
        <div class="subtitle">4 Collections &middot; Spring, Summer, Fall, Winter</div>
      </div>
      <div>
        <a href="wardrobe.html">Wardrobe</a> &nbsp;|&nbsp;
        <a href="index.html">Dashboard</a>
      </div>
    </div>

    <div class="toolbar" id="toolbar"></div>
    <div class="outfit-grid" id="outfit-grid"></div>
  </div>

  <div class="modal-overlay" id="detail-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeDetail()">&times;</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <div class="zoom-overlay" id="zoom-overlay" onclick="this.classList.remove('open')">
    <img id="zoom-img" src="" alt="" />
  </div>

  <!-- Crop Modal -->
  <div class="modal-overlay" id="crop-modal">
    <div class="modal" style="max-width:700px;">
      <button class="modal-close" onclick="closeCrop()">&times;</button>
      <div class="modal-title" style="font-size:1.1rem;">Crop Image</div>
      <p style="font-size:0.75rem;color:#8A8A9A;margin-bottom:0.75rem;">Click and drag to select the area you want to keep.</p>
      <div id="crop-container" style="position:relative;display:inline-block;cursor:crosshair;user-select:none;">
        <canvas id="crop-canvas" style="max-width:100%;border-radius:6px;border:1px solid #ebe5dc;"></canvas>
        <div id="crop-box" style="position:absolute;border:2px dashed #006FED;background:rgba(0,111,237,0.1);display:none;pointer-events:none;"></div>
      </div>
      <div class="edit-toolbar" style="margin-top:0.75rem;">
        <button class="edit-btn" onclick="resetCrop()">Reset</button>
        <button class="edit-btn primary" onclick="applyCrop()">Apply Crop</button>
        <button class="edit-btn" onclick="closeCrop()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="outfit-data.js"></script>
  <script src="wardrobe-data.js?v=7"></script>
  <script>
    firebase.initializeApp({
      apiKey:"AIzaSyCedyhhnkomtrW3ynwAkzSbtrePMTyZPmQ",
      authDomain:"morning-dashboard-4c62b.firebaseapp.com",
      databaseURL:"https://morning-dashboard-4c62b-default-rtdb.firebaseio.com",
      projectId:"morning-dashboard-4c62b",
      storageBucket:"morning-dashboard-4c62b.firebasestorage.app",
      messagingSenderId:"289564921391",
      appId:"1:289564921391:web:4ed9e388d5f63218f780da"
    });
    const db = firebase.database();

    const IMG_PATH = 'outfit-images/';
    let outfits = window.OUTFIT_DATA || [];
    let activeFilter = 'All';
    let _outfitEdits = {};
    let dragSlide = null;
    let activeSeason = 'All';

    // Check for filtered view from wardrobe
    const urlParams = new URLSearchParams(window.location.search);
    const filterSlides = urlParams.get('slides');
    const fromItem = urlParams.get('from');
    let slideFilter = null;
    if (filterSlides) slideFilter = filterSlides.split(',').map(Number);

    // Deleted outfits (must be before render)
    let _deletedOutfits = {};

    // Load edits from Firebase
    db.ref('outfitEdits').on('value', snap => {
      _outfitEdits = snap.val() || {};
      // Apply edits
      outfits.forEach(o => {
        const edit = _outfitEdits[o.slide];
        if (edit) {
          if (edit.occasion) o.occasion = edit.occasion;
          if (edit.season) o.season = edit.season;
          if (edit.order !== undefined) o._order = edit.order;
          if (edit.layout) o.layout = edit.layout;
        }
      });
      render();
    });

    const OCCASIONS = ['Casual', 'Office', 'Evening', 'OOTD', 'Travel'];

    function mapOccasion(raw) {
      const r = raw.toLowerCase();
      if (r.includes('casual') || r.includes('cool day')) return 'Casual';
      if (r.includes('office') || r.includes('business') || r.includes('work')) return 'Office';
      if (r.includes('evening') || r.includes('night') || r.includes('dinner')) return 'Evening';
      if (r.includes('trip') || r.includes('paris') || r.includes('san diego') || r.includes('miami') || r.includes('boston') || r.includes('france') || r.includes('japan')) return 'Travel';
      if (r.includes('ootd') || r.includes('outfit')) return 'OOTD';
      if (r.includes('vacation') || r.includes('summer')) return 'OOTD';
      return 'OOTD';
    }

    function getOccasions() {
      outfits.forEach(o => {
        // Use Firebase edit if available, otherwise auto-map
        const edit = _outfitEdits[o.slide];
        if (edit && edit.occasion && OCCASIONS.includes(edit.occasion)) {
          o._filterCat = edit.occasion;
        } else {
          o._filterCat = mapOccasion(o.occasion);
        }
      });
      return ['All', ...OCCASIONS];
    }

    function render() {
      const occasions = getOccasions();
      // Collection (season) filters
      let toolbarHtml = '<div style="width:100%;margin-bottom:0.75rem;display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;">';
      toolbarHtml += '<span style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#2c2418;margin-right:0.3rem;">Collections:</span>';
      const collectionSeasons = ['All', ...SEASONS];
      collectionSeasons.forEach(s => {
        const count = s === 'All'
          ? outfits.filter(o => !_deletedOutfits[o.slide]).length
          : outfits.filter(o => !_deletedOutfits[o.slide] && o.season === s).length;
        toolbarHtml += `<button class="filter-btn ${activeSeason===s?'active':''}" onclick="activeSeason='${s}';render();">${s} <span style="opacity:0.6;font-size:0.6rem;">${count}</span></button>`;
      });
      toolbarHtml += '</div>';

      // Occasion filters
      toolbarHtml += '<div style="display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center;">';
      toolbarHtml += '<span style="font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#b8a48e;margin-right:0.3rem;">Occasion:</span>';
      occasions.forEach(o => {
        toolbarHtml += `<button class="filter-btn ${activeFilter===o?'active':''}" onclick="activeFilter='${o}';render();">${o}</button>`;
      });
      toolbarHtml += '</div>';

      // Filter out deleted outfits
      let filtered = outfits.filter(o => !_deletedOutfits[o.slide]);

      // Apply category filter
      if (activeFilter !== 'All') filtered = filtered.filter(o => o._filterCat === activeFilter);

      // Apply season filter
      if (activeSeason !== 'All') filtered = filtered.filter(o => o.season === activeSeason);

      // Apply slide filter from wardrobe link
      if (slideFilter) {
        filtered = filtered.filter(o => slideFilter.includes(o.slide));
      }

      if (slideFilter) {
        toolbarHtml = `<div style="width:100%;margin-bottom:0.5rem;">
          <a href="wardrobe.html" style="font-size:0.78rem;color:#9c8b76;text-decoration:none;">&larr; Back to Wardrobe</a>
          <span style="font-size:0.78rem;color:#6b5d4d;margin-left:0.5rem;">Showing ${filtered.length} outfit${filtered.length!==1?'s':''} with this item</span>
          <a href="outfit-gallery.html" style="font-size:0.72rem;color:#c2553a;margin-left:1rem;text-decoration:underline;">Show all outfits</a>
        </div>` + toolbarHtml;
      }

      toolbarHtml += `<span class="count">${filtered.length} outfits</span>`;
      document.getElementById('toolbar').innerHTML = toolbarHtml;

      // Sort by custom order if set
      filtered.sort((a, b) => (a._order || 0) - (b._order || 0));

      let html = '';
      filtered.forEach((o, idx) => {
        let previewImgs = '';
        if (o.layout && o.layout.length) {
          previewImgs = o.layout.map(item => {
            const src = item.file.startsWith('data:') ? item.file
              : item.file.startsWith('..') ? item.file
              : IMG_PATH + item.file;
            return `<img src="${src}" alt="" loading="lazy"
              style="left:${item.left}%;top:${item.top}%;width:${item.width}%;height:${item.height}%;" />`;
          }).join('');
        } else {
          previewImgs = o.images.slice(0, 6).map(f =>
            `<img src="${IMG_PATH}${f}" alt="" loading="lazy" style="position:static;height:60px;width:auto;" />`
          ).join('');
        }
        const brandTags = (o.brands || []).slice(0, 3).map(b =>
          `<span class="outfit-card-tag">${b}</span>`
        ).join('');

        html += `<div class="outfit-card" data-slide="${o.slide}" draggable="true"
                  ondragstart="startDrag(event,${o.slide})"
                  ondragover="event.preventDefault();this.classList.add('drag-over')"
                  ondragleave="this.classList.remove('drag-over')"
                  ondrop="dropCard(event,${o.slide});this.classList.remove('drag-over')">
          <div class="outfit-preview" onclick="showDetail(${o.slide})">
            <span class="drag-handle">&#x2630;</span>
            <button class="delete-card-btn" onclick="event.stopPropagation();deleteOutfitCard(${o.slide})">&times; Delete</button>
            ${previewImgs}
          </div>
          <div class="outfit-card-info">
            <div class="outfit-card-title" onclick="event.stopPropagation();showOccasionPicker(${o.slide},this)">${o._filterCat}</div>
            <div class="outfit-card-season" onclick="event.stopPropagation();showSeasonPicker(${o.slide},this)">${o.season}</div>
            <div class="outfit-card-meta">${o.images.length} pieces</div>
            ${brandTags}
          </div>
        </div>`;
      });
      document.getElementById('outfit-grid').innerHTML = html || '<p style="color:#b8a48e;">No outfits match this filter.</p>';
    }

    let _editingOutfit = null;
    let _editMode = false;
    let _editLayout = [];
    let _dragPiece = null;
    let _dragOffset = {x:0, y:0};
    let _resizePiece = null;
    let _addPanelOpen = false;

    function showDetail(slideNum) {
      const o = outfits.find(x => x.slide === slideNum);
      if (!o) return;
      _editingOutfit = slideNum;
      _editMode = false;
      _editLayout = JSON.parse(JSON.stringify(o.layout || []));
      _addPanelOpen = false;
      renderDetail(o);
    }

    function renderDetail(o) {
      if (!o) o = outfits.find(x => x.slide === _editingOutfit);
      if (!o) return;

      let html = `<div class="modal-title">${o._filterCat || o.occasion}</div>`;
      html += `<div class="modal-meta">${o.season} &middot; ${_editLayout.length} pieces</div>`;

      // Edit toolbar
      html += '<div class="edit-toolbar">';
      if (!_editMode) {
        html += `<button class="edit-btn" onclick="toggleEdit()">Edit Layout</button>`;
      } else {
        html += `<button class="edit-btn active" onclick="toggleEdit()">Editing...</button>`;
        html += `<button class="edit-btn" onclick="toggleAddPanel()">+ Add Piece</button>`;
        html += `<button class="edit-btn primary" onclick="saveLayout()">Save</button>`;
        html += `<button class="edit-btn danger" onclick="cancelEdit()">Cancel</button>`;
      }
      html += '</div>';

      // Pieces container
      html += `<div style="position:relative;"><div class="modal-pieces${_editMode ? ' editing' : ''}" id="pieces-container">`;

      _editLayout.forEach((item, idx) => {
        if (_editMode) {
          const imgSrc = item.file.startsWith('data:') ? item.file : IMG_PATH + item.file;
          html += `<div class="piece-wrap" data-idx="${idx}" style="left:${item.left}%;top:${item.top}%;width:${item.width}%;height:${item.height}%;"
            onmousedown="startDragPiece(event,${idx})">
            <img src="${imgSrc}" alt="" style="width:100%;height:100%;position:static;" />
            <button class="edit-crop-btn" onclick="event.stopPropagation();openCropTool(${idx})">&#x2702;</button>
            <button class="edit-delete-btn" onclick="event.stopPropagation();deletePiece(${idx})">×</button>
            <div class="edit-resize" onmousedown="event.stopPropagation();startResizePiece(event,${idx})"></div>
          </div>`;
        } else {
          const viewSrc = item.file.startsWith('data:') ? item.file : item.file.startsWith('..') ? item.file : IMG_PATH + item.file;
          html += `<img src="${viewSrc}" alt=""
            style="left:${item.left}%;top:${item.top}%;width:${item.width}%;height:${item.height}%;"
            onclick="zoomImg('${item.file}')" />`;
        }
      });
      html += '</div>';

      // Add piece panel
      if (_editMode) {
        html += `<div class="add-piece-panel${_addPanelOpen ? ' open' : ''}" id="add-panel">
          <input type="text" id="add-search" placeholder="e.g. black heels, blue bag, Chanel..." oninput="renderAddPanel()" />
          <div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:0.4rem;" id="add-quick-filters"></div>
          <div class="add-piece-grid" id="add-grid"></div>
        </div>`;
      }
      html += '</div>';

      document.getElementById('detail-content').innerHTML = html;
      document.getElementById('detail-modal').classList.add('open');

      if (_editMode && _addPanelOpen) {
        renderAddPanel();
        // Quick filter buttons
        const qf = document.getElementById('add-quick-filters');
        if (qf) {
          const cats = ['Tops', 'Pants', 'Dresses', 'Skirts', 'Shoes', 'Bags', 'Jewelry', 'Knitwear', 'Jackets & Coats', 'Casual', 'Shorts', 'Accessories'];
          qf.innerHTML = `<button style="font-size:0.55rem;padding:0.15rem 0.4rem;border-radius:10px;border:1px solid #ddd;background:${!_addCatFilter?'#013E7D':'#fff'};color:${!_addCatFilter?'#fff':'#5a5a6e'};cursor:pointer;font-family:inherit;"
              onclick="_addCatFilter=null;document.getElementById('add-search').value='';renderAddPanel();">All</button>` +
            cats.map(c =>
            `<button style="font-size:0.55rem;padding:0.15rem 0.4rem;border-radius:10px;border:1px solid #ddd;background:${_addCatFilter===c?'#013E7D':'#fff'};color:${_addCatFilter===c?'#fff':'#5a5a6e'};cursor:pointer;font-family:inherit;"
              onclick="setAddCatFilter('${c}')">${c}</button>`
          ).join('');
        }
      }
    }

    function toggleEdit() {
      _editMode = !_editMode;
      if (_editMode) {
        const o = outfits.find(x => x.slide === _editingOutfit);
        _editLayout = JSON.parse(JSON.stringify(o.layout || []));
      }
      renderDetail();
    }

    function cancelEdit() {
      _editMode = false;
      _addPanelOpen = false;
      const o = outfits.find(x => x.slide === _editingOutfit);
      _editLayout = JSON.parse(JSON.stringify(o.layout || []));
      renderDetail();
    }

    function saveLayout() {
      const updates = _outfitEdits[_editingOutfit] || {};
      updates.layout = _editLayout;
      db.ref('outfitEdits/' + _editingOutfit).set(updates);
      // Also update local outfit
      const o = outfits.find(x => x.slide === _editingOutfit);
      if (o) o.layout = JSON.parse(JSON.stringify(_editLayout));
      _editMode = false;
      _addPanelOpen = false;
      renderDetail();
      render(); // refresh cards
    }

    function deletePiece(idx) {
      _editLayout.splice(idx, 1);
      renderDetail();
    }

    function toggleAddPanel() {
      _addPanelOpen = !_addPanelOpen;
      renderDetail();
    }

    let _addCatFilter = null;

    function setAddCatFilter(cat) {
      _addCatFilter = cat;
      const searchEl = document.getElementById('add-search');
      if (searchEl) searchEl.value = '';
      renderAddPanel();
    }

    function renderAddPanel() {
      const search = (document.getElementById('add-search')?.value || '').toLowerCase();
      const wardrobeItems = window.WARDROBE_ITEMS || [];
      let filtered = wardrobeItems;

      if (_addCatFilter) {
        // Category button was clicked - exact category match
        filtered = filtered.filter(i => i.category === _addCatFilter);
      }

      if (search) {
        _addCatFilter = null;
        const terms = search.split(/\s+/);

        // Category/type keywords that should match category or subcategory only
        const typeWords = ['pants','tops','shoes','bags','dresses','skirts','shorts',
          'heels','flats','boots','sneakers','sandals','blazers','jackets','coats',
          'jewelry','necklaces','bracelets','earrings','knitwear','cardigans',
          'pullovers','shirts','accessories','casual','jeans'];

        filtered = wardrobeItems.filter(i => {
          const catText = [i.category, i.subcategory].join(' ').toLowerCase();
          const allText = [i.category, i.subcategory, ...(i.labels || []), ...(i.colors || [])].join(' ').toLowerCase();

          return terms.every(t => {
            if (typeWords.includes(t)) {
              // Type words must match category or subcategory
              return catText.includes(t);
            } else {
              // Other words (colors, brands) can match anything
              return allText.includes(t);
            }
          });
        });
      }
      const grid = document.getElementById('add-grid');
      if (!grid) return;
      const MAX_SHOW = 200;
      grid.innerHTML = filtered.slice(0, MAX_SHOW).map(i => {
        const tooltip = [i.subcategory, ...(i.labels || []), ...(i.colors || [])].join(', ');
        const fileKey = i.file.replace(/\./g, '_');
        const imgSrc = (_wardrobeCrops[fileKey]) || (i._customImage) || ('wardrobe-thumbs/' + i.file);
        return `<img src="${imgSrc}" alt="${i.subcategory}" title="${tooltip}"
          onclick="addPieceFromWardrobe('${i.file}')" />`;
      }).join('');

      // Show result count
      const countEl = document.createElement('div');
      countEl.style.cssText = 'font-size:0.65rem;color:#8A8A9A;margin-top:0.3rem;';
      countEl.textContent = filtered.length + ' items' + (filtered.length > MAX_SHOW ? ` (showing ${MAX_SHOW})` : '');
      grid.parentNode.appendChild(countEl);
    }

    function addPieceFromWardrobe(filePath) {
      _editLayout.push({
        file: filePath.replace('wardrobe-thumbs/', '../wardrobe-thumbs/'),
        left: 40, top: 30, width: 15, height: 25
      });
      renderDetail();
    }

    // Drag pieces in edit mode
    function startDragPiece(e, idx) {
      if (!_editMode) return;
      _dragPiece = idx;
      const container = document.getElementById('pieces-container');
      const rect = container.getBoundingClientRect();
      _dragOffset = {
        x: e.clientX - (rect.width * _editLayout[idx].left / 100),
        y: e.clientY - (rect.height * _editLayout[idx].top / 100)
      };
      e.preventDefault();
    }

    function startResizePiece(e, idx) {
      if (!_editMode) return;
      _resizePiece = idx;
      e.preventDefault();
    }

    document.addEventListener('mousemove', e => {
      const container = document.getElementById('pieces-container');
      if (!container) return;
      const rect = container.getBoundingClientRect();

      if (_dragPiece !== null && _editMode) {
        const left = Math.max(0, Math.min(90, ((e.clientX - _dragOffset.x) / rect.width) * 100));
        const top = Math.max(0, Math.min(90, ((e.clientY - _dragOffset.y) / rect.height) * 100));
        _editLayout[_dragPiece].left = Math.round(left * 10) / 10;
        _editLayout[_dragPiece].top = Math.round(top * 10) / 10;
        const wrap = container.querySelector(`[data-idx="${_dragPiece}"]`);
        if (wrap) { wrap.style.left = left + '%'; wrap.style.top = top + '%'; }
      }

      if (_resizePiece !== null && _editMode) {
        const item = _editLayout[_resizePiece];
        const w = Math.max(5, ((e.clientX - rect.left) / rect.width * 100) - item.left);
        const h = Math.max(5, ((e.clientY - rect.top) / rect.height * 100) - item.top);
        item.width = Math.round(Math.min(60, w) * 10) / 10;
        item.height = Math.round(Math.min(70, h) * 10) / 10;
        const wrap = container.querySelector(`[data-idx="${_resizePiece}"]`);
        if (wrap) { wrap.style.width = w + '%'; wrap.style.height = h + '%'; }
      }
    });

    document.addEventListener('mouseup', () => {
      _dragPiece = null;
      _resizePiece = null;
    });

    function closeDetail() {
      document.getElementById('detail-modal').classList.remove('open');
      _editMode = false;
      _addPanelOpen = false;
    }

    function zoomImg(f) {
      if (_editMode) return;
      document.getElementById('zoom-img').src = IMG_PATH + f;
      document.getElementById('zoom-overlay').classList.add('open');
    }

    // Delete outfit - listen for changes
    db.ref('deletedOutfits').on('value', snap => {
      _deletedOutfits = snap.val() || {};
      render();
    });

    function deleteOutfitCard(slide) {
      if (!confirm('Delete this outfit?')) return;
      db.ref('deletedOutfits/' + slide).set(true);
    }

    // Occasion picker
    function showOccasionPicker(slide, el) {
      const currentVal = el.textContent;
      const select = document.createElement('select');
      select.className = 'season-select';
      OCCASIONS.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o;
        opt.textContent = o;
        if (o === currentVal) opt.selected = true;
        select.appendChild(opt);
      });
      el.textContent = '';
      el.appendChild(select);
      select.focus();

      let saved = false;
      function save() {
        if (saved) return;
        saved = true;
        const newVal = select.value;
        const updates = _outfitEdits[slide] || {};
        updates.occasion = newVal;
        _outfitEdits[slide] = updates;
        db.ref('outfitEdits/' + slide).set(updates);
        // Update local outfit
        const outfit = outfits.find(o => o.slide === slide);
        if (outfit) { outfit.occasion = newVal; outfit._filterCat = newVal; }
        render();
      }
      select.addEventListener('change', save);
      select.addEventListener('blur', () => { if (!saved) save(); });
    }

    // Season picker
    const SEASONS = ['Spring', 'Summer', 'Fall', 'Winter'];

    function showSeasonPicker(slide, el) {
      const currentVal = el.textContent;
      const select = document.createElement('select');
      select.className = 'season-select';
      SEASONS.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        if (s === currentVal) opt.selected = true;
        select.appendChild(opt);
      });
      el.textContent = '';
      el.appendChild(select);
      select.focus();

      let saved = false;
      function save() {
        if (saved) return;
        saved = true;
        const newVal = select.value;
        const updates = _outfitEdits[slide] || {};
        updates.season = newVal;
        _outfitEdits[slide] = updates;
        db.ref('outfitEdits/' + slide).set(updates);
        // Update local outfit
        const outfit = outfits.find(o => o.slide === slide);
        if (outfit) outfit.season = newVal;
        render();
      }
      select.addEventListener('change', save);
      select.addEventListener('blur', () => { if (!saved) save(); });
    }

    // Inline editing
    function editOutfitField(slide, field, el) {
      const currentVal = el.textContent;
      const input = document.createElement('input');
      input.className = 'edit-input';
      input.value = currentVal;
      el.textContent = '';
      el.appendChild(input);
      input.focus();
      input.select();

      function save() {
        const newVal = input.value.trim();
        if (newVal && newVal !== currentVal) {
          const updates = _outfitEdits[slide] || {};
          updates[field] = newVal;
          db.ref('outfitEdits/' + slide).set(updates);
        } else {
          el.textContent = currentVal;
        }
      }
      input.addEventListener('blur', save);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { el.textContent = currentVal; }
      });
    }

    // Drag to reorder
    function startDrag(e, slide) {
      dragSlide = slide;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => e.target.classList.add('dragging'), 0);
    }

    function dropCard(e, targetSlide) {
      e.preventDefault();
      if (dragSlide === null || dragSlide === targetSlide) return;

      // Swap order values
      const srcOutfit = outfits.find(o => o.slide === dragSlide);
      const tgtOutfit = outfits.find(o => o.slide === targetSlide);
      if (!srcOutfit || !tgtOutfit) return;

      const srcOrder = srcOutfit._order || outfits.indexOf(srcOutfit);
      const tgtOrder = tgtOutfit._order || outfits.indexOf(tgtOutfit);

      // Save new orders
      const srcEdits = _outfitEdits[dragSlide] || {};
      srcEdits.order = tgtOrder;
      db.ref('outfitEdits/' + dragSlide).set(srcEdits);

      const tgtEdits = _outfitEdits[targetSlide] || {};
      tgtEdits.order = srcOrder;
      db.ref('outfitEdits/' + targetSlide).set(tgtEdits);

      dragSlide = null;
    }

    document.addEventListener('dragend', () => {
      document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
      dragSlide = null;
    });

    // Close modals on overlay click
    document.getElementById('detail-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('detail-modal')) closeDetail();
    });

    // ── Crop Tool ──
    let _cropImg = null;
    let _cropFile = null;
    let _cropIdx = null;
    let _cropStart = null;
    let _cropEnd = null;
    let _cropping = false;
    let _cropScale = 1;

    function openCropTool(idx) {
      const item = _editLayout[idx];
      if (!item) return;
      _cropIdx = idx;
      _cropFile = item.file;

      const imgEl = new window.Image();
      imgEl.crossOrigin = 'anonymous';
      imgEl.onload = function() {
        _cropImg = imgEl;
        const canvas = document.getElementById('crop-canvas');
        // Scale to fit modal (max 600px wide)
        _cropScale = Math.min(600 / imgEl.width, 500 / imgEl.height, 1);
        canvas.width = imgEl.width * _cropScale;
        canvas.height = imgEl.height * _cropScale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(imgEl, 0, 0, canvas.width, canvas.height);
        _cropStart = null;
        _cropEnd = null;
        document.getElementById('crop-box').style.display = 'none';
        document.getElementById('crop-modal').classList.add('open');
      };
      imgEl.src = IMG_PATH + _cropFile;
    }

    // Mouse events for crop selection
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('crop-container');

      container.addEventListener('mousedown', e => {
        if (!document.getElementById('crop-modal').classList.contains('open')) return;
        const rect = document.getElementById('crop-canvas').getBoundingClientRect();
        _cropStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        _cropEnd = { ..._cropStart };
        _cropping = true;
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!_cropping) return;
        const rect = document.getElementById('crop-canvas').getBoundingClientRect();
        _cropEnd = {
          x: Math.max(0, Math.min(e.clientX - rect.left, rect.width)),
          y: Math.max(0, Math.min(e.clientY - rect.top, rect.height))
        };
        const box = document.getElementById('crop-box');
        const x = Math.min(_cropStart.x, _cropEnd.x);
        const y = Math.min(_cropStart.y, _cropEnd.y);
        const w = Math.abs(_cropEnd.x - _cropStart.x);
        const h = Math.abs(_cropEnd.y - _cropStart.y);
        box.style.display = 'block';
        box.style.left = x + 'px';
        box.style.top = y + 'px';
        box.style.width = w + 'px';
        box.style.height = h + 'px';
      });

      document.addEventListener('mouseup', () => { _cropping = false; });
    });

    function resetCrop() {
      if (!_cropImg) return;
      const canvas = document.getElementById('crop-canvas');
      const ctx = canvas.getContext('2d');
      ctx.drawImage(_cropImg, 0, 0, canvas.width, canvas.height);
      document.getElementById('crop-box').style.display = 'none';
      _cropStart = null;
      _cropEnd = null;
    }

    function applyCrop() {
      if (!_cropStart || !_cropEnd || !_cropImg) return;

      // Calculate crop in original image coordinates
      const x = Math.min(_cropStart.x, _cropEnd.x) / _cropScale;
      const y = Math.min(_cropStart.y, _cropEnd.y) / _cropScale;
      const w = Math.abs(_cropEnd.x - _cropStart.x) / _cropScale;
      const h = Math.abs(_cropEnd.y - _cropStart.y) / _cropScale;

      if (w < 10 || h < 10) { alert('Selection too small'); return; }

      // Crop on canvas
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = w;
      tempCanvas.height = h;
      const ctx = tempCanvas.getContext('2d');
      ctx.drawImage(_cropImg, x, y, w, h, 0, 0, w, h);

      // Convert to data URL and update the image in the layout
      const dataUrl = tempCanvas.toDataURL('image/png');

      // Update the layout item to use the cropped image
      if (_cropIdx !== null && _editLayout[_cropIdx]) {
        _editLayout[_cropIdx].file = dataUrl;
        _editLayout[_cropIdx]._cropped = true;
      }

      closeCrop();
      renderDetail();
    }

    function closeCrop() {
      document.getElementById('crop-modal').classList.remove('open');
      _cropImg = null;
      _cropping = false;
    }

    // Apply wardrobe crops to outfit images
    let _wardrobeCrops = {};
    db.ref('wardrobeCrops').on('value', snap => {
      _wardrobeCrops = snap.val() || {};
      // Update any visible images that match
      for (const [fileKey, dataUrl] of Object.entries(_wardrobeCrops)) {
        const filename = fileKey.replace(/_png$/, '.png').replace(/_jpg$/, '.jpg');
        document.querySelectorAll(`img[src*="${filename}"]`).forEach(img => {
          img.src = dataUrl;
        });
      }
    });

    // Override addPieceFromWardrobe to use cropped version if available
    const _origAddPiece = addPieceFromWardrobe;
    addPieceFromWardrobe = function(filename) {
      const fileKey = filename.replace(/\./g, '_');
      const croppedUrl = _wardrobeCrops[fileKey];
      // Find custom items too
      const wardrobeItems = window.WARDROBE_ITEMS || [];
      const customItem = wardrobeItems.find(i => i.id === filename && i._customImage);

      const imgSrc = croppedUrl || (customItem && customItem._customImage) || ('../wardrobe-thumbs/' + filename);

      _editLayout.push({
        file: imgSrc,
        _origFile: filename,
        left: 40, top: 30, width: 15, height: 25
      });
      renderDetail();
    };

    // Initial render (after all functions defined)
    render();
  </script>
</body>
</html>
