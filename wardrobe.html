<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wardrobe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: 'Inter', -apple-system, sans-serif; background: #faf8f5; color: #3d3529; }

    .banner {
      height: 80px;
      background: linear-gradient(135deg, #e8ddd3 0%, #d4c5b5 30%, #c9b99a 60%, #bfae8e 100%);
      position: relative;
    }
    .banner::after { content:''; position:absolute; bottom:0; left:0; right:0; height:30px; background:linear-gradient(to top,#faf8f5,transparent); }

    .container { max-width: 1200px; margin: -10px auto 0; padding: 0 2rem 3rem; position: relative; }

    .page-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;
    }
    .page-header h1 { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:600; color:#2c2418; }
    .page-header a { font-size:0.8rem; color:#9c8b76; text-decoration:none; }
    .page-header a:hover { color:#3d3529; text-decoration:underline; }

    /* Tabs */
    .tabs { display:flex; gap:0; margin-bottom:1.25rem; border-bottom:2px solid #ebe5dc; }
    .tab {
      padding:0.6rem 1.5rem; font-size:0.85rem; font-weight:500; color:#9c8b76;
      cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.2s;
    }
    .tab:hover { color:#3d3529; }
    .tab.active { color:#2c2418; border-bottom-color:#2c2418; }

    /* Toolbar */
    .toolbar { display:flex; gap:0.6rem; margin-bottom:1rem; flex-wrap:wrap; align-items:center; }
    .search-input {
      flex:1; min-width:180px; border:1px solid #ebe5dc; border-radius:8px;
      padding:0.5rem 0.8rem; font-size:0.82rem; font-family:inherit; color:#3d3529; background:#fff; outline:none;
    }
    .search-input:focus { border-color:#c9b99a; }
    .search-input::placeholder { color:#c9bfb0; }
    .filter-btn {
      font-size:0.68rem; padding:0.35rem 0.65rem; border-radius:20px;
      border:1px solid #ebe5dc; background:#fff; color:#6b5d4d; cursor:pointer; font-family:inherit;
    }
    .filter-btn:hover { border-color:#c9b99a; }
    .filter-btn.active { background:#3d3529; color:#fff; border-color:#3d3529; }
    .item-count { font-size:0.7rem; color:#b8a48e; margin-left:auto; }

    /* Catalogue Grid */
    .cat-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:0.75rem;
    }
    .cat-subheader {
      grid-column: 1 / -1;
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.5px; color: #9c8b76;
      padding: 0.75rem 0 0.25rem; border-top: 1px solid #ebe5dc;
      margin-top: 0.5rem;
    }
    .cat-subheader:first-child { border-top: none; margin-top: 0; }
    .cat-item {
      background:#fff; border:1px solid #ebe5dc; border-radius:8px; overflow:hidden;
      cursor:pointer; transition:border-color 0.2s, box-shadow 0.2s;
    }
    .cat-item:hover { border-color:#c9b99a; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .cat-item.dragging { opacity:0.3; }
    .cat-item.drag-over { border-color:#c9b99a; box-shadow:0 0 0 2px #c9b99a; }
    .cat-item img { width:100%; height:170px; object-fit:cover; display:block; border-bottom:1px solid #f0ebe4; }
    .cat-item-info { padding:0.4rem 0.6rem; }
    .cat-item-cat { font-size:0.58rem; color:#9c8b76; text-transform:uppercase; letter-spacing:0.5px; }
    .cat-item-sub { font-size:0.7rem; color:#6b5d4d; }
    .cat-item-cat, .cat-item-sub {
      cursor:pointer; padding:0.1rem 0.2rem; border-radius:3px; margin:-0.1rem -0.2rem;
      transition:background 0.15s;
    }
    .cat-item-cat:hover, .cat-item-sub:hover { background:#f0ebe4; }
    .edit-input {
      border:1px solid #c9b99a; border-radius:3px; padding:0.1rem 0.3rem;
      font-size:inherit; font-family:inherit; color:#3d3529;
      background:#fff; outline:none; width:100%;
    }
    .cat-item-outfits {
      font-size:0.6rem; color:#fff; background:#c9b99a;
      padding:0.12rem 0.4rem; border-radius:10px; display:inline-block; margin-top:0.2rem;
      cursor:pointer;
    }
    .cat-item-outfits:hover { background:#b8a48e; }

    /* View panel */
    .panel-section { display:none; }
    .panel-section.active { display:block; }

    /* Outfit Builder */
    .outfit-area {
      display:flex; gap:1.5rem; height:calc(100vh - 220px); min-height:500px;
    }
    .outfit-sidebar {
      width:200px; flex-shrink:0; overflow-y:auto; background:#fff;
      border:1px solid #ebe5dc; border-radius:8px; padding:0.75rem;
    }
    .outfit-sidebar-title {
      font-size:0.65rem; font-weight:600; text-transform:uppercase; letter-spacing:1px;
      color:#9c8b76; margin-bottom:0.5rem;
    }
    .outfit-sidebar .filter-btn { display:block; width:100%; text-align:left; margin-bottom:0.3rem; }
    .outfit-pieces {
      display:grid; grid-template-columns:1fr 1fr; gap:0.4rem; margin-top:0.5rem;
    }
    .outfit-piece {
      width:100%; aspect-ratio:1; object-fit:contain; border-radius:4px;
      cursor:grab; border:1px solid #ebe5dc; background:#f9f7f4; padding:2px;
    }
    .outfit-piece:active { cursor:grabbing; }

    .outfit-canvas-wrap { flex:1; display:flex; flex-direction:column; gap:0.75rem; }
    .outfit-toolbar {
      display:flex; gap:0.5rem; align-items:center;
    }
    .outfit-toolbar input {
      flex:1; border:1px solid #ebe5dc; border-radius:6px;
      padding:0.4rem 0.6rem; font-size:0.8rem; font-family:inherit; outline:none;
    }
    .outfit-toolbar input:focus { border-color:#c9b99a; }
    .outfit-btn {
      padding:0.4rem 0.8rem; border-radius:6px; border:1px solid #ebe5dc;
      background:#fff; color:#6b5d4d; font-size:0.75rem; cursor:pointer; font-family:inherit;
    }
    .outfit-btn:hover { background:#f5f0e8; }
    .outfit-btn.primary { background:#3d3529; color:#fff; border-color:#3d3529; }
    .outfit-btn.primary:hover { background:#2c2418; }
    .outfit-btn.danger { color:#c2553a; border-color:#fde8e8; }
    .outfit-btn.danger:hover { background:#fde8e8; }

    .outfit-canvas {
      flex:1; background:#fff; border:1px solid #ebe5dc; border-radius:10px;
      position:relative; overflow:hidden; min-height:400px;
    }
    .outfit-canvas-empty {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      text-align:center; color:#c9bfb0; font-size:0.85rem;
    }
    .canvas-item {
      position:absolute; cursor:move; user-select:none;
      border:2px solid transparent; border-radius:6px; transition:border-color 0.15s;
    }
    .canvas-item:hover { border-color:#c9b99a; }
    .canvas-item.selected { border-color:#3d3529; }
    .canvas-item img { width:100%; height:100%; object-fit:cover; border-radius:4px; pointer-events:none; }
    .canvas-item .remove-btn {
      position:absolute; top:-8px; right:-8px; width:20px; height:20px;
      background:#c2553a; color:#fff; border-radius:50%; font-size:0.65rem;
      display:none; align-items:center; justify-content:center; cursor:pointer; border:none;
    }
    .canvas-item:hover .remove-btn { display:flex; }
    .canvas-item .resize-handle {
      position:absolute; bottom:-4px; right:-4px; width:14px; height:14px;
      background:#3d3529; border-radius:2px; cursor:se-resize;
      display:none;
    }
    .canvas-item:hover .resize-handle { display:block; }

    /* Saved Outfits */
    .saved-outfits { margin-top:1rem; }
    .saved-outfit {
      display:inline-flex; align-items:center; gap:0.4rem;
      padding:0.35rem 0.7rem; margin:0.25rem; border-radius:20px;
      border:1px solid #ebe5dc; background:#fff; font-size:0.75rem;
      color:#6b5d4d; cursor:pointer;
    }
    .saved-outfit:hover { border-color:#c9b99a; }
    .saved-outfit.active { background:#3d3529; color:#fff; border-color:#3d3529; }
    .saved-outfit .del { color:#c2553a; margin-left:0.3rem; font-size:0.65rem; }

    /* Modal */
    .modal-overlay {
      display:none; position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(44,36,24,0.5); z-index:1000; justify-content:center; align-items:center;
    }
    .modal-overlay.open { display:flex; }
    .modal-overlay img {
      max-width:90vw; max-height:85vh; border-radius:10px; box-shadow:0 8px 40px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="banner"></div>
  <div class="container">
    <div class="page-header">
      <h1>My Wardrobe</h1>
      <a href="outfit-gallery.html">Outfit Gallery</a> &nbsp;|&nbsp; <a href="index.html">&larr; Dashboard</a>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('catalogue')">Catalogue</div>
      <div class="tab" onclick="switchTab('outfits')">Outfit Builder</div>
    </div>

    <!-- CATALOGUE -->
    <div id="panel-catalogue" class="panel-section active">
      <div class="toolbar">
        <input type="text" class="search-input" id="cat-search" placeholder="Search wardrobe..." oninput="renderCatalogue()" />
        <div id="cat-filters"></div>
        <span class="item-count" id="cat-count"></span>
        <button onclick="document.getElementById('add-item-modal').classList.add('open')" style="padding:0.4rem 0.8rem;border-radius:8px;border:none;background:#013E7D;color:#fff;font-size:0.78rem;cursor:pointer;font-family:inherit;white-space:nowrap;">+ Add Item</button>
      </div>
      <div id="cat-grid" class="cat-grid"></div>
    </div>

    <!-- OUTFIT BUILDER -->
    <div id="panel-outfits" class="panel-section">
      <div class="outfit-area">
        <div class="outfit-sidebar">
          <div class="outfit-sidebar-title">Pieces</div>
          <input type="text" class="search-input" id="outfit-search" placeholder="Search..." oninput="renderOutfitSidebar()" style="width:100%;margin-bottom:0.5rem;font-size:0.75rem;padding:0.35rem 0.5rem;" />
          <div id="outfit-filters"></div>
          <div id="outfit-pieces" class="outfit-pieces"></div>
        </div>
        <div class="outfit-canvas-wrap">
          <div class="outfit-toolbar">
            <input type="text" id="outfit-name" placeholder="Outfit name..." />
            <button class="outfit-btn primary" onclick="saveOutfit()">Save</button>
            <button class="outfit-btn" onclick="newOutfit()">New</button>
            <button class="outfit-btn danger" onclick="clearCanvas()">Clear</button>
          </div>
          <div class="outfit-canvas" id="outfit-canvas"
               ondragover="event.preventDefault()"
               ondrop="dropOnCanvas(event)">
            <div class="outfit-canvas-empty" id="canvas-empty">
              Drag pieces here to build an outfit
            </div>
          </div>
          <div class="saved-outfits" id="saved-outfits"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Item Modal -->
  <div class="modal-overlay" id="add-item-modal">
    <div style="background:#fff;border-radius:12px;max-width:500px;width:100%;padding:2rem;position:relative;box-shadow:0 8px 40px rgba(0,0,0,0.15);">
      <button onclick="document.getElementById('add-item-modal').classList.remove('open')" style="position:absolute;top:1rem;right:1.25rem;font-size:1.3rem;color:#b8a48e;cursor:pointer;background:none;border:none;">&times;</button>
      <div style="font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;color:#2c2418;margin-bottom:1rem;">Add Wardrobe Item</div>

      <div style="margin-bottom:1rem;">
        <label style="font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#9c8b76;display:block;margin-bottom:0.3rem;">Photo</label>
        <input type="file" id="add-photo" accept="image/*" style="font-size:0.82rem;font-family:inherit;" />
        <div id="add-photo-preview" style="margin-top:0.5rem;"></div>
      </div>

      <div style="display:flex;gap:0.75rem;margin-bottom:1rem;">
        <div style="flex:1;">
          <label style="font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#9c8b76;display:block;margin-bottom:0.3rem;">Category</label>
          <select id="add-category" style="width:100%;border:1px solid #ebe5dc;border-radius:6px;padding:0.45rem 0.6rem;font-size:0.82rem;font-family:inherit;color:#3d3529;outline:none;">
            <option>Tops</option><option>Pants</option><option>Dresses</option>
            <option>Skirts</option><option>Shoes</option><option>Bags</option>
            <option>Jewelry</option><option>Knitwear</option><option>Jackets & Coats</option>
            <option>Casual</option><option>Shorts</option><option>Accessories</option>
          </select>
        </div>
        <div style="flex:1;">
          <label style="font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#9c8b76;display:block;margin-bottom:0.3rem;">Subcategory</label>
          <input type="text" id="add-subcategory" placeholder="e.g. Heels, Blazers..." style="width:100%;border:1px solid #ebe5dc;border-radius:6px;padding:0.45rem 0.6rem;font-size:0.82rem;font-family:inherit;color:#3d3529;outline:none;" />
        </div>
      </div>

      <div style="margin-bottom:1rem;">
        <label style="font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#9c8b76;display:block;margin-bottom:0.3rem;">Brand / Label</label>
        <input type="text" id="add-brand" placeholder="e.g. Zara, Chanel..." style="width:100%;border:1px solid #ebe5dc;border-radius:6px;padding:0.45rem 0.6rem;font-size:0.82rem;font-family:inherit;color:#3d3529;outline:none;" />
      </div>

      <div style="margin-bottom:1rem;">
        <label style="font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#9c8b76;display:block;margin-bottom:0.3rem;">Color</label>
        <input type="text" id="add-color" placeholder="e.g. black, navy, cream..." style="width:100%;border:1px solid #ebe5dc;border-radius:6px;padding:0.45rem 0.6rem;font-size:0.82rem;font-family:inherit;color:#3d3529;outline:none;" />
      </div>

      <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
        <button onclick="document.getElementById('add-item-modal').classList.remove('open')" style="padding:0.5rem 1rem;border-radius:8px;border:1px solid #ebe5dc;background:#fff;color:#6b5d4d;font-size:0.82rem;cursor:pointer;font-family:inherit;">Cancel</button>
        <button onclick="saveNewItem()" style="padding:0.5rem 1.2rem;border-radius:8px;border:none;background:#013E7D;color:#fff;font-size:0.82rem;cursor:pointer;font-family:inherit;">Add to Wardrobe</button>
      </div>
    </div>
  </div>

  <!-- Image zoom modal -->
  <div class="modal-overlay" id="zoom-modal">
    <div style="position:relative;display:inline-block;">
      <img id="zoom-img" src="" alt="" style="max-width:90vw;max-height:80vh;border-radius:10px;" />
      <div style="text-align:center;margin-top:0.75rem;">
        <button onclick="openWardrobeCrop()" style="padding:0.5rem 1.2rem;border-radius:8px;border:1px solid #fff;background:rgba(0,111,237,0.9);color:#fff;font-size:0.85rem;cursor:pointer;font-family:inherit;">Crop This Image</button>
        <button onclick="document.getElementById('zoom-modal').classList.remove('open')" style="padding:0.5rem 1.2rem;border-radius:8px;border:1px solid rgba(255,255,255,0.5);background:rgba(0,0,0,0.5);color:#fff;font-size:0.85rem;cursor:pointer;font-family:inherit;margin-left:0.5rem;">Close</button>
      </div>
    </div>
  </div>

  <!-- Crop modal -->
  <div class="modal-overlay" id="wcrop-modal">
    <div style="background:#fff;border-radius:12px;max-width:700px;width:100%;padding:2rem;position:relative;box-shadow:0 8px 40px rgba(0,0,0,0.15);">
      <button onclick="closeWardrobeCrop()" style="position:absolute;top:1rem;right:1.25rem;font-size:1.3rem;color:#b8a48e;cursor:pointer;background:none;border:none;">&times;</button>
      <div style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;color:#2c2418;margin-bottom:0.25rem;">Crop Image</div>
      <p style="font-size:0.75rem;color:#8A8A9A;margin-bottom:0.75rem;">Click and drag to select the area you want to keep.</p>
      <div id="wcrop-container" style="position:relative;display:inline-block;cursor:crosshair;user-select:none;">
        <canvas id="wcrop-canvas" style="max-width:100%;border-radius:6px;border:1px solid #ebe5dc;"></canvas>
        <div id="wcrop-box" style="position:absolute;border:2px dashed #006FED;background:rgba(0,111,237,0.1);display:none;pointer-events:none;"></div>
      </div>
      <div style="display:flex;gap:0.5rem;margin-top:0.75rem;">
        <button onclick="resetWardrobeCrop()" style="padding:0.4rem 0.8rem;border-radius:6px;border:1px solid #ebe5dc;background:#fff;color:#6b5d4d;font-size:0.75rem;cursor:pointer;font-family:inherit;">Reset</button>
        <button onclick="applyWardrobeCrop()" style="padding:0.4rem 0.8rem;border-radius:6px;border:none;background:#013E7D;color:#fff;font-size:0.75rem;cursor:pointer;font-family:inherit;">Apply Crop</button>
        <button onclick="closeWardrobeCrop()" style="padding:0.4rem 0.8rem;border-radius:6px;border:1px solid #ebe5dc;background:#fff;color:#6b5d4d;font-size:0.75rem;cursor:pointer;font-family:inherit;">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="wardrobe-data.js?v=7"></script>
  <script src="wardrobe-outfits.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:"AIzaSyCedyhhnkomtrW3ynwAkzSbtrePMTyZPmQ",
      authDomain:"morning-dashboard-4c62b.firebaseapp.com",
      databaseURL:"https://morning-dashboard-4c62b-default-rtdb.firebaseio.com",
      projectId:"morning-dashboard-4c62b",
      storageBucket:"morning-dashboard-4c62b.firebasestorage.app",
      messagingSenderId:"289564921391",
      appId:"1:289564921391:web:4ed9e388d5f63218f780da"
    });
    const db = firebase.database();

    const items = window.WARDROBE_ITEMS || [];
    const IMG_PATH = 'wardrobe-thumbs/';
    let catFilter = 'All';
    let outfitFilter = 'All';

    // ── Tabs ──
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel-section').forEach(p => p.classList.remove('active'));
      document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
      document.getElementById('panel-' + (tab === 'catalogue' ? 'catalogue' : 'outfits')).classList.add('active');
    }

    // ── Catalogue ──
    function getCats() { return ['All', ...new Set(items.map(i => i.category))].sort((a,b) => a==='All'?-1:b==='All'?1:a.localeCompare(b)); }

    function renderCatFilters() {
      const cats = getCats();
      document.getElementById('cat-filters').innerHTML = cats.map(c =>
        `<button class="filter-btn ${catFilter===c?'active':''}" onclick="catFilter='${c}';renderCatalogue();renderCatFilters();">${c}</button>`
      ).join('');
    }

    const outfitMap = window.WARDROBE_OUTFIT_MAP || {};
    let _itemOverrides = {}; // Firebase overrides for category/subcategory

    // Load overrides from Firebase
    db.ref('wardrobeEdits').on('value', snap => {
      _itemOverrides = snap.val() || {};
      // Apply overrides to items
      items.forEach(i => {
        const ov = _itemOverrides[i.id];
        if (ov) {
          if (ov.category) i.category = ov.category;
          if (ov.subcategory) i.subcategory = ov.subcategory;
        }
      });
      renderCatFilters();
      renderCatalogue();
    });

    function renderCatalogue() {
      // Apply saved order if available
      const orderKey = catFilter !== 'All' ? catFilter.replace(/[.#$/\[\]]/g, '_') : 'all';
      const savedOrder = _itemOrder[orderKey];
      if (savedOrder && Array.isArray(savedOrder)) {
        const orderMap = {};
        savedOrder.forEach((id, idx) => orderMap[id] = idx);
        items.sort((a, b) => {
          const oa = orderMap[a.id] !== undefined ? orderMap[a.id] : 99999;
          const ob = orderMap[b.id] !== undefined ? orderMap[b.id] : 99999;
          return oa - ob;
        });
      }

      const search = (document.getElementById('cat-search')?.value||'').toLowerCase();
      let filtered = items.filter(i => {
        if (catFilter !== 'All' && i.category !== catFilter) return false;
        if (search) {
          const h = [i.category, i.subcategory, ...i.labels].join(' ').toLowerCase();
          if (!h.includes(search)) return false;
        }
        return true;
      });

      document.getElementById('cat-count').textContent = filtered.length + ' items';

      // Build HTML with subcategory headers when viewing a single category
      let gridHtml = '';
      let lastSub = '';
      filtered.forEach(i => {
        // Add subcategory header when it changes (only when filtering a single category)
        if (catFilter !== 'All' && i.subcategory !== lastSub) {
          lastSub = i.subcategory;
          gridHtml += `<div class="cat-subheader">${i.subcategory}</div>`;
        }

        const outfitSlides = outfitMap[i.file] || [];
        const outfitBadge = outfitSlides.length > 0
          ? `<div class="cat-item-outfits" onclick="event.stopPropagation();viewOutfitsForItem('${i.file}')">${outfitSlides.length} outfit${outfitSlides.length>1?'s':''}</div>`
          : '';
        gridHtml += `<div class="cat-item" draggable="true"
          data-id="${i.id}"
          ondragstart="startItemDrag(event,'${i.id}')"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="dropItem(event,'${i.id}');this.classList.remove('drag-over')">
          <img src="${i._customImage || (IMG_PATH + i.file)}" alt="${i.subcategory}" loading="lazy" onclick="zoomImage('${i._customImage || i.file}')" />
          <div class="cat-item-info">
            <div class="cat-item-cat" onclick="event.stopPropagation();editField('${i.id}','category',this)" title="Click to edit category">${i.category}</div>
            <div class="cat-item-sub" onclick="event.stopPropagation();editField('${i.id}','subcategory',this)" title="Click to edit subcategory">${i.subcategory}</div>
            ${outfitBadge}
          </div>
        </div>`;
      });
      document.getElementById('cat-grid').innerHTML = gridHtml;
    }

    function editField(itemId, field, el) {
      const currentVal = el.textContent;
      const input = document.createElement('input');
      input.className = 'edit-input';
      input.value = currentVal;
      el.textContent = '';
      el.appendChild(input);
      input.focus();
      input.select();

      function save() {
        const newVal = input.value.trim();
        if (newVal && newVal !== currentVal) {
          // Save override to Firebase
          const updates = _itemOverrides[itemId] || {};
          updates[field] = newVal;
          db.ref('wardrobeEdits/' + itemId).set(updates);
        } else {
          el.textContent = currentVal;
        }
      }

      input.addEventListener('blur', save);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { el.textContent = currentVal; }
      });
    }

    // Drag to reorder
    let _dragItemId = null;
    let _itemOrder = {};

    db.ref('wardrobeOrder').on('value', snap => {
      _itemOrder = snap.val() || {};
    });

    function startItemDrag(e, id) {
      _dragItemId = id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => {
        const el = document.querySelector(`[data-id="${id}"]`);
        if (el) el.classList.add('dragging');
      }, 0);
    }

    function dropItem(e, targetId) {
      e.preventDefault();
      if (!_dragItemId || _dragItemId === targetId) return;

      // Find indices in current filtered view
      const search = (document.getElementById('cat-search')?.value||'').toLowerCase();
      let filtered = items.filter(i => {
        if (catFilter !== 'All' && i.category !== catFilter) return false;
        if (search) {
          const h = [i.category, i.subcategory, ...i.labels].join(' ').toLowerCase();
          if (!h.includes(search)) return false;
        }
        return true;
      });

      const srcIdx = filtered.findIndex(i => i.id === _dragItemId);
      const tgtIdx = filtered.findIndex(i => i.id === targetId);
      if (srcIdx === -1 || tgtIdx === -1) return;

      // Move item in the master items array
      const masterSrcIdx = items.findIndex(i => i.id === _dragItemId);
      const masterTgtIdx = items.findIndex(i => i.id === targetId);
      if (masterSrcIdx === -1 || masterTgtIdx === -1) return;

      const [moved] = items.splice(masterSrcIdx, 1);
      items.splice(masterTgtIdx, 0, moved);

      // Save new order to Firebase (just store array of IDs)
      const orderKey = catFilter !== 'All' ? catFilter : 'all';
      const newOrder = items.filter(i => catFilter === 'All' || i.category === catFilter).map(i => i.id);
      db.ref('wardrobeOrder/' + orderKey.replace(/[.#$/\[\]]/g, '_')).set(newOrder);

      _dragItemId = null;
      renderCatalogue();
    }

    document.addEventListener('dragend', () => {
      document.querySelectorAll('.cat-item.dragging').forEach(el => el.classList.remove('dragging'));
      _dragItemId = null;
    });

    function viewOutfitsForItem(file) {
      const slides = outfitMap[file] || [];
      if (!slides.length) return;
      // Navigate to outfit gallery filtered by these slides
      const param = encodeURIComponent(slides.join(','));
      window.location.href = `outfit-gallery.html?slides=${param}&from=${encodeURIComponent(file)}`;
    }

    function zoomImage(file) {
      document.getElementById('zoom-img').src = file.startsWith('data:') ? file : IMG_PATH + file;
      document.getElementById('zoom-modal').classList.add('open');
    }

    renderCatFilters();
    renderCatalogue();

    // ── Outfit Builder ──
    let canvasItems = [];
    let dragItemFile = null;
    let savedOutfits = {};
    let currentOutfitId = null;
    let dragTarget = null;
    let dragOffset = {x:0, y:0};
    let resizeTarget = null;

    function renderOutfitFilters() {
      const cats = getCats();
      document.getElementById('outfit-filters').innerHTML = cats.map(c =>
        `<button class="filter-btn ${outfitFilter===c?'active':''}" onclick="outfitFilter='${c}';renderOutfitSidebar();renderOutfitFilters();" style="font-size:0.6rem;padding:0.25rem 0.5rem;">${c}</button>`
      ).join('');
    }

    function renderOutfitSidebar() {
      const search = (document.getElementById('outfit-search')?.value||'').toLowerCase();
      let filtered = items.filter(i => {
        if (outfitFilter !== 'All' && i.category !== outfitFilter) return false;
        if (search) {
          const h = [i.category, i.subcategory, ...i.labels].join(' ').toLowerCase();
          if (!h.includes(search)) return false;
        }
        return true;
      });
      document.getElementById('outfit-pieces').innerHTML = filtered.map(i =>
        `<img class="outfit-piece" src="${i._customImage || (IMG_PATH + i.file)}" alt="${i.subcategory}"
              draggable="true" ondragstart="dragItemFile='${i.file}'" />`
      ).join('');
    }

    function dropOnCanvas(e) {
      e.preventDefault();
      if (!dragItemFile) return;
      const rect = document.getElementById('outfit-canvas').getBoundingClientRect();
      const x = e.clientX - rect.left - 50;
      const y = e.clientY - rect.top - 50;
      canvasItems.push({ file: dragItemFile, x: Math.max(0,x), y: Math.max(0,y), w: 120, h: 150 });
      dragItemFile = null;
      renderCanvas();
    }

    function renderCanvas() {
      const canvas = document.getElementById('outfit-canvas');
      const empty = document.getElementById('canvas-empty');
      empty.style.display = canvasItems.length ? 'none' : '';

      // Remove old items
      canvas.querySelectorAll('.canvas-item').forEach(el => el.remove());

      canvasItems.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'canvas-item';
        div.style.cssText = `left:${item.x}px;top:${item.y}px;width:${item.w}px;height:${item.h}px;`;
        div.innerHTML = `
          <img src="${IMG_PATH}${item.file}" alt="" />
          <button class="remove-btn" onclick="removeCanvasItem(${idx})">&times;</button>
          <div class="resize-handle" onmousedown="startResize(event,${idx})"></div>
        `;
        div.onmousedown = function(e) {
          if (e.target.classList.contains('resize-handle') || e.target.classList.contains('remove-btn')) return;
          dragTarget = idx;
          dragOffset = { x: e.clientX - item.x, y: e.clientY - item.y };
          e.preventDefault();
        };
        canvas.appendChild(div);
      });
    }

    document.addEventListener('mousemove', e => {
      if (dragTarget !== null) {
        const rect = document.getElementById('outfit-canvas').getBoundingClientRect();
        canvasItems[dragTarget].x = Math.max(0, e.clientX - dragOffset.x);
        canvasItems[dragTarget].y = Math.max(0, e.clientY - dragOffset.y - rect.top + document.getElementById('outfit-canvas').offsetTop);
        // Simpler: use relative to canvas
        canvasItems[dragTarget].x = Math.max(0, e.clientX - rect.left - dragOffset.x + canvasItems[dragTarget].x);
        canvasItems[dragTarget].x = e.clientX - rect.left - (dragOffset.x - canvasItems[dragTarget].x);
        // Reset - just use direct position
        canvasItems[dragTarget].x = Math.max(0, Math.min(e.clientX - rect.left - 60, rect.width - canvasItems[dragTarget].w));
        canvasItems[dragTarget].y = Math.max(0, Math.min(e.clientY - rect.top - 75, rect.height - canvasItems[dragTarget].h));
        renderCanvas();
      }
      if (resizeTarget !== null) {
        const rect = document.getElementById('outfit-canvas').getBoundingClientRect();
        const item = canvasItems[resizeTarget];
        item.w = Math.max(60, e.clientX - rect.left - item.x);
        item.h = Math.max(60, e.clientY - rect.top - item.y);
        renderCanvas();
      }
    });

    document.addEventListener('mouseup', () => { dragTarget = null; resizeTarget = null; });

    function startResize(e, idx) { resizeTarget = idx; e.stopPropagation(); e.preventDefault(); }
    function removeCanvasItem(idx) { canvasItems.splice(idx, 1); renderCanvas(); }
    function clearCanvas() { canvasItems = []; currentOutfitId = null; document.getElementById('outfit-name').value = ''; renderCanvas(); renderSavedOutfits(); }

    function newOutfit() {
      canvasItems = [];
      currentOutfitId = null;
      document.getElementById('outfit-name').value = '';
      renderCanvas();
      renderSavedOutfits();
    }

    function saveOutfit() {
      const name = document.getElementById('outfit-name').value.trim() || 'Untitled Outfit';
      if (canvasItems.length === 0) { alert('Add some pieces first!'); return; }
      const data = { name, items: JSON.parse(JSON.stringify(canvasItems)), updated: new Date().toISOString() };
      if (currentOutfitId) {
        db.ref('outfits/' + currentOutfitId).set(data);
      } else {
        const ref = db.ref('outfits').push(data);
        currentOutfitId = ref.key;
      }
    }

    function loadOutfit(id) {
      const outfit = savedOutfits[id];
      if (!outfit) return;
      currentOutfitId = id;
      canvasItems = JSON.parse(JSON.stringify(outfit.items || []));
      document.getElementById('outfit-name').value = outfit.name || '';
      renderCanvas();
      renderSavedOutfits();
    }

    function deleteOutfit(id, e) {
      e.stopPropagation();
      if (!confirm('Delete this outfit?')) return;
      db.ref('outfits/' + id).remove();
      if (currentOutfitId === id) newOutfit();
    }

    function renderSavedOutfits() {
      const entries = Object.entries(savedOutfits);
      if (!entries.length) { document.getElementById('saved-outfits').innerHTML = ''; return; }
      document.getElementById('saved-outfits').innerHTML = '<div style="font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#9c8b76;margin-bottom:0.4rem;">Saved Outfits</div>' +
        entries.map(([id, o]) =>
          `<span class="saved-outfit ${currentOutfitId===id?'active':''}" onclick="loadOutfit('${id}')">
            ${o.name || 'Untitled'}
            <span class="del" onclick="deleteOutfit('${id}',event)">&times;</span>
          </span>`
        ).join('');
    }

    // Firebase sync for outfits
    db.ref('outfits').on('value', snap => {
      savedOutfits = snap.val() || {};
      renderSavedOutfits();
    });

    renderOutfitFilters();
    renderOutfitSidebar();
    renderCanvas();

    // ── Add New Item ──
    document.getElementById('add-photo').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        document.getElementById('add-photo-preview').innerHTML =
          `<img src="${ev.target.result}" style="max-height:150px;border-radius:6px;border:1px solid #ebe5dc;" />`;
      };
      reader.readAsDataURL(file);
    });

    function saveNewItem() {
      const fileInput = document.getElementById('add-photo');
      const category = document.getElementById('add-category').value;
      const subcategory = document.getElementById('add-subcategory').value.trim() || category;
      const brand = document.getElementById('add-brand').value.trim();
      const color = document.getElementById('add-color').value.trim();

      if (!fileInput.files[0]) { alert('Please select a photo.'); return; }

      const reader = new FileReader();
      reader.onload = function(ev) {
        const dataUrl = ev.target.result;
        const id = 'custom_' + Date.now();

        // Save to Firebase
        const itemData = {
          id: id,
          category: category,
          subcategory: subcategory,
          labels: brand ? [brand] : [],
          colors: color ? color.split(',').map(c => c.trim()) : [],
          image: dataUrl,
          added: new Date().toISOString()
        };
        db.ref('wardrobeCustomItems/' + id).set(itemData);

        // Add to local items array
        items.push({
          id: id,
          file: id,
          category: category,
          subcategory: subcategory,
          labels: brand ? [brand] : [],
          colors: color ? color.split(',').map(c => c.trim()) : [],
          _customImage: dataUrl
        });

        // Close modal and refresh
        document.getElementById('add-item-modal').classList.remove('open');
        fileInput.value = '';
        document.getElementById('add-photo-preview').innerHTML = '';
        document.getElementById('add-subcategory').value = '';
        document.getElementById('add-brand').value = '';
        document.getElementById('add-color').value = '';
        renderCatFilters();
        renderCatalogue();
      };
      reader.readAsDataURL(fileInput.files[0]);
    }

    // Load custom items from Firebase on startup
    db.ref('wardrobeCustomItems').on('value', snap => {
      const custom = snap.val() || {};
      // Remove old custom items from array
      for (let i = items.length - 1; i >= 0; i--) {
        if (items[i].id && items[i].id.startsWith('custom_')) items.splice(i, 1);
      }
      // Add current custom items
      for (const [id, data] of Object.entries(custom)) {
        items.push({
          id: id,
          file: id,
          category: data.category,
          subcategory: data.subcategory,
          labels: data.labels || [],
          colors: data.colors || [],
          _customImage: data.image
        });
      }
      renderCatFilters();
      renderCatalogue();
    });

    // ── Wardrobe Crop Tool ──
    let _wcropImg = null;
    let _wcropFile = null;
    let _wcropStart = null;
    let _wcropEnd = null;
    let _wcropping = false;
    let _wcropScale = 1;

    function openWardrobeCrop() {
      document.getElementById('zoom-modal').classList.remove('open');
      const src = document.getElementById('zoom-img').src;
      // Extract filename from src
      const parts = src.split('/');
      _wcropFile = parts[parts.length - 1];

      const imgEl = new window.Image();
      imgEl.crossOrigin = 'anonymous';
      imgEl.onload = function() {
        _wcropImg = imgEl;
        const canvas = document.getElementById('wcrop-canvas');
        _wcropScale = Math.min(600 / imgEl.width, 500 / imgEl.height, 1);
        canvas.width = imgEl.width * _wcropScale;
        canvas.height = imgEl.height * _wcropScale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(imgEl, 0, 0, canvas.width, canvas.height);
        _wcropStart = null;
        _wcropEnd = null;
        document.getElementById('wcrop-box').style.display = 'none';
        document.getElementById('wcrop-modal').classList.add('open');
      };
      imgEl.src = src;
    }

    (function() {
      const container = document.getElementById('wcrop-container');
      if (!container) return;

      container.addEventListener('mousedown', e => {
        if (!document.getElementById('wcrop-modal').classList.contains('open')) return;
        const rect = document.getElementById('wcrop-canvas').getBoundingClientRect();
        _wcropStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        _wcropEnd = { ..._wcropStart };
        _wcropping = true;
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!_wcropping) return;
        const rect = document.getElementById('wcrop-canvas').getBoundingClientRect();
        _wcropEnd = {
          x: Math.max(0, Math.min(e.clientX - rect.left, rect.width)),
          y: Math.max(0, Math.min(e.clientY - rect.top, rect.height))
        };
        const box = document.getElementById('wcrop-box');
        box.style.display = 'block';
        box.style.left = Math.min(_wcropStart.x, _wcropEnd.x) + 'px';
        box.style.top = Math.min(_wcropStart.y, _wcropEnd.y) + 'px';
        box.style.width = Math.abs(_wcropEnd.x - _wcropStart.x) + 'px';
        box.style.height = Math.abs(_wcropEnd.y - _wcropStart.y) + 'px';
      });

      document.addEventListener('mouseup', () => { _wcropping = false; });
    })();

    function resetWardrobeCrop() {
      if (!_wcropImg) return;
      const canvas = document.getElementById('wcrop-canvas');
      canvas.getContext('2d').drawImage(_wcropImg, 0, 0, canvas.width, canvas.height);
      document.getElementById('wcrop-box').style.display = 'none';
      _wcropStart = null;
    }

    function applyWardrobeCrop() {
      if (!_wcropStart || !_wcropEnd || !_wcropImg) return;
      const x = Math.min(_wcropStart.x, _wcropEnd.x) / _wcropScale;
      const y = Math.min(_wcropStart.y, _wcropEnd.y) / _wcropScale;
      const w = Math.abs(_wcropEnd.x - _wcropStart.x) / _wcropScale;
      const h = Math.abs(_wcropEnd.y - _wcropStart.y) / _wcropScale;
      if (w < 10 || h < 10) { alert('Selection too small'); return; }

      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = w;
      tempCanvas.height = h;
      tempCanvas.getContext('2d').drawImage(_wcropImg, x, y, w, h, 0, 0, w, h);

      // Save cropped image back to server via Firebase
      const dataUrl = tempCanvas.toDataURL('image/png');
      db.ref('wardrobeCrops/' + _wcropFile.replace(/\./g, '_')).set(dataUrl);

      // Update the thumbnail in the current page
      document.querySelectorAll(`img[src*="${_wcropFile}"]`).forEach(img => {
        img.src = dataUrl;
      });

      closeWardrobeCrop();
      alert('Crop saved! This image will show the cropped version everywhere.');
    }

    function closeWardrobeCrop() {
      document.getElementById('wcrop-modal').classList.remove('open');
      _wcropImg = null;
      _wcropping = false;
    }

    // Apply saved crops on load
    db.ref('wardrobeCrops').on('value', snap => {
      const crops = snap.val() || {};
      for (const [fileKey, dataUrl] of Object.entries(crops)) {
        // fileKey is filename with dots replaced by underscores
        const filename = fileKey.replace(/_png$/, '.png').replace(/_jpg$/, '.jpg');
        document.querySelectorAll(`img[src*="${filename}"]`).forEach(img => {
          img.src = dataUrl;
        });
      }
    });
  </script>
</body>
</html>
